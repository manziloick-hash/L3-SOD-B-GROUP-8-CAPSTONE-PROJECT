<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Payment Page</title>
  
  
  <style>
    
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#ff8800;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .payment-box{
      background:rgb(6, 0, 0);
      width:380px;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .tabs{
      display:flex;
      margin-bottom:20px;
      border-radius:10px;
      overflow:hidden;
    }

    .tabs button{
      flex:1;
      padding:12px;
      border:none;
      cursor:pointer;
      background:#ddd;
      font-weight:bold;
      transition:0.3s;
    }

    .tabs button.active{
      background:#f88502;
      color:rgb(255, 255, 255);
    }

    .payment-form{
      display:none;
    }

    .payment-form.active{
      display:block;
    }

    .input-box{
      margin-bottom:15px;
    }

    .input-box label{
      display:block;
      margin-bottom:5px;
      color:#555;
      font-size:14px;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
    }

    .row{
      display:flex;
      gap:10px;
    }

    .pay-btn{
      width:100%;
      padding:12px;
      background:#f88502;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .pay-btn:hover{
      background:#f38d00;
    }

    .momo-code{
      background:#f9f9f9;
      padding:10px;
      border-radius:8px;
      margin-bottom:15px;
      text-align:center;
      font-weight:bold;
      color:#ff9800;
    }
  </style>
  
</head>
<button onclick="window.location.href='index.html';" style="position: absolute; top: 20px; left: 20px; padding: 10px 15px; background-color: #000000; color: white; border: none; border-radius: 5px; cursor: pointer;">🔙Back to Home</button>
<body>

  <div class="payment-box">
    <h2>Payment Method</h2>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showForm('card')">
        Card
      </button>

      <button class="tab-btn" onclick="showForm('momo')">
        MoMo Pay
      </button>
    </div>

    <!-- Card Payment -->
    <div id="card" class="payment-form active">
      <form>
        <div class="input-box">
          <label>Card Holder Name</label>
          <input type="text" placeholder="Enter your name">
        </div>

        <div class="input-box">
          <label>Card Number</label>
          <input type="text" placeholder="1234 5678 9012 3456">
        </div>

        <div class="row">
          <div class="input-box">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
          </div>

          <div class="input-box">
            <label>CVV</label>
            <input type="password" placeholder="123">
          </div>
        </div>

        <div class="input-box">
          <label>Amount</label>
          <input type="text" placeholder="$100">
        </div>

        <button class="pay-btn">Pay with Card</button>
      </form>
    </div>

    <!-- MoMo Payment -->
    <div id="momo" class="payment-form">

      <div class="momo-code">
        MoMo Code: *182*8*1233332#
      </div>

      <form>
        <div class="input-box">
          <label>Phone Number</label>
          <input type="text" placeholder="07XXXXXXXX">
        </div>

        <div class="input-box">
          <label>MoMo Pay Code</label>
          <input type="text" placeholder="Enter merchant code">
        </div>

        <div class="input-box">
          <label>Amount</label>
          <input type="text" placeholder="RWF 5000">
        </div>

        <button class="pay-btn">Pay with MoMo</button>
      </form>

    </div>
  </div>

  <script>
    function showForm(formId){

      // Hide all forms
      document.querySelectorAll('.payment-form')
      .forEach(form => {
        form.classList.remove('active');
      });

      // Remove active from buttons
      document.querySelectorAll('.tab-btn')
      .forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected form
      document.getElementById(formId)
      .classList.add('active');

      // Activate clicked button
      event.target.classList.add('active');
    }
  </script>

</body>
</html>
